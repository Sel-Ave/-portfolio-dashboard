    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,

      font-size: 14px;
      line-height: 1.5;
      color: #1a1a1a;
      background: #f0f0f0;
      padding: 20px;
    }

    /* ── Header ── */
    .page-header { margin-bottom: 20px; }
    .page-title  { font-size: 20px; font-weight: 700; }
    .page-meta   { font-size: 12px; color: #666; margin-top: 4px; }

    /* ── KPI grid ── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .kpi-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 14px 16px;
    }
    .kpi-label {
      font-size: 11px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
    }
    .kpi-value { font-size: 20px; font-weight: 700; line-height: 1.2; }
    .kpi-sub   { font-size: 11px; color: #888; margin-top: 6px; }

    /* ── Section card ── */
    .section {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px;
      margin-bottom: 20px;
    }
    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #444;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #eee;
    }
    .section-subtitle { font-size: 12px; color: #999; font-weight: 400; }

    /* ── Chart pair layout ── */
    .chart-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .chart-col-title { font-size: 12px; color: #888; margin-bottom: 6px; }
    .echart { width: 100%; }

    /* ── NAV single-point ── */
    .nav-notice { font-size: 13px; color: #666; padding: 6px 0 10px; }
    .nav-sp-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 10px;
    }
    .nav-sp-card {
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 14px 16px;
    }
    .nav-sp-label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .nav-sp-val   { font-size: 22px; font-weight: 700; }
    .nav-sp-sub   { font-size: 12px; color: #888; margin-top: 4px; }
    .nav-sp-diff  { font-size: 14px; font-weight: 600; padding-top: 6px; }

    /* ── Positions table ── */
    .table-wrap { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 720px;
    }
    thead th {
      text-align: right;
      padding: 6px 8px;
      border-bottom: 2px solid #e0e0e0;
      font-size: 11px;
      font-weight: 600;
      color: #666;
      white-space: nowrap;
    }
    thead th.left { text-align: left; }
    tbody td {
      text-align: right;
      padding: 5px 8px;
      border-bottom: 1px solid #f2f2f2;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    tbody td.left { text-align: left; }
    tbody tr:hover td { background: #fafafa; }
    tfoot td {
      text-align: right;
      padding: 6px 8px;
      font-weight: 700;
      border-top: 2px solid #ddd;
      background: #f8f8f8;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    tfoot td.left { text-align: left; }
    .stale-label { color: #e65100; font-size: 11px; display: block; }

    /* ── Tags ── */
    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
    }
    .tag-etf   { background: #e3f2fd; color: #1565c0; }
    .tag-stock { background: #fce4ec; color: #880e4f; }
    .tag-cash  { background: #f3e5f5; color: #6a1b9a; }

    /* ── Positive / negative ── */
    .pos { color: #2e7d32; }
    .neg { color: #c62828; }

    /* ── Price-alert severities (per docs/investment_discipline.md) ── */
    .alert-review { color: #ef6c00; font-weight: 600; }
    .alert-hard   { color: #c62828; font-weight: 700; }
    .kpi-card.alert-review { border-color: #ef6c00; box-shadow: inset 4px 0 0 #ef6c00; }
    .kpi-card.alert-hard   { border-color: #c62828; box-shadow: inset 4px 0 0 #c62828; }
    tbody tr.row-alert-review td { background: #fff7e6; }
    tbody tr.row-alert-hard   td { background: #fde9e9; }
    .alert-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      margin-left: 6px;
      vertical-align: middle;
    }
    .alert-badge.review { background: #fff3e0; color: #ef6c00; }
    .alert-badge.hard   { background: #ffebee; color: #c62828; }

    /* ── Transactions ── */
    .tx-day { margin-bottom: 8px; }
    .tx-day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 7px 10px;
      background: #f7f7f7;
      border: 1px solid #e8e8e8;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      user-select: none;
    }
    .tx-day-header:hover { background: #eeeeee; }
    .tx-day-hint { font-size: 11px; color: #888; font-weight: 400; }
    .tx-items { }
    .tx-item {
      display: flex;
      align-items: baseline;
      flex-wrap: wrap;
      gap: 6px;
      padding: 5px 10px;
      border-bottom: 1px solid #f5f5f5;
      font-size: 13px;
    }
    .tx-item:last-child { border-bottom: none; }
    .badge {
      font-size: 10px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 3px;
      min-width: 36px;
      text-align: center;
      flex-shrink: 0;
    }
    .badge-buy  { background: #e8f5e9; color: #2e7d32; }
    .badge-sell { background: #ffebee; color: #c62828; }
    .tx-sym  { font-weight: 600; min-width: 52px; }
    .tx-qty  { color: #555; }
    .tx-cat  { font-size: 11px; color: #aaa; }
    .tx-net  { font-variant-numeric: tabular-nums; margin-left: auto; }
    .tx-memo-toggle {
      font-size: 11px;
      color: #aaa;
      cursor: pointer;
      text-decoration: underline dotted;
      flex-basis: 100%;
      padding-left: 44px;
    }
    .tx-memo-text { flex-basis: 100%; font-size: 11px; color: #888; padding-left: 44px; }
    .empty-state { color: #888; padding: 12px 0; font-size: 13px; }

    /* ── Utility ── */
    .hidden { display: none !important; }

    @media (max-width: 680px) {
      .chart-pair  { grid-template-columns: 1fr; }
      .nav-sp-grid { grid-template-columns: 1fr; }
      .kpi-grid    { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

<!-- 3.0 Header -->
<div class="page-header">
  <div class="page-title" id="pg-title"></div>
  <div class="page-meta"  id="pg-meta"></div>
</div>

<!-- 3.1 KPI Cards -->
<div class="kpi-grid" id="kpi-grid"></div>

<!-- 3.2 NAV vs Benchmark -->
<div class="section">
  <div class="section-title">
    Net Value vs Benchmark
    <span class="section-subtitle" id="nav-subtitle"></span>
  </div>
  <div id="nav-section"></div>
</div>

<!-- 3.3 Allocation -->
<div class="section">
  <div class="section-title">Allocation</div>
  <div class="chart-pair">
    <div>
      <div class="chart-col-title">Actual Weight</div>
      <div id="donut-chart" class="echart" style="height:340px"></div>
    </div>
    <div>
      <div class="chart-col-title">Drift vs Baseline (pp)</div>
      <div id="drift-chart" class="echart"></div>
    </div>
  </div>
</div>

<!-- 3.4 Positions -->
<div class="section">
  <div class="section-title">Positions</div>
  <div class="table-wrap" id="positions-wrap"></div>
</div>

<!-- 3.5 Transactions -->
<div class="section">
  <div class="section-title">Transactions</div>
  <div id="tx-list"></div>
</div>

<script>
(function () {
'use strict';

// ── Formatters ────────────────────────────────────────────────────────────────
function fmtUSD(n) {
  if (n == null) return '—';
  return '$' + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmt2(n) {
  if (n == null) return '—';
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}
function fmtPct(n) {
  if (n == null) return '—';
  var pct = n * 100;
  var dp = Math.abs(pct) >= 1 ? 2 : Math.abs(pct) >= 0.01 ? 4 : 6;
  return (n > 0 ? '+' : '') + pct.toFixed(dp) + '%';
}
function fmtPp(n) {
  if (n == null) return '—';
  return (n > 0 ? '+' : '') + n.toFixed(2) + ' pp';
}
function fmtW(n) {
  if (n == null) return '—';
  return (n * 100).toFixed(2) + '%';
}
function fmtRel(n) {
  if (n == null) return '—';
  return (n > 0 ? '+' : '') + n.toFixed(1) + '%';
}
function fmtSignedPct(n) {
  if (n == null) return '—';
  return (n > 0 ? '+' : '') + n.toFixed(2) + '%';
}
function alertCls(status) {
  if (status === 'hard_review') return 'alert-hard';
  if (status === 'review') return 'alert-review';
  return '';
}
function alertBadge(status, label) {
  if (status === 'hard_review') {
    return ' <span class="alert-badge hard">' + esc(label) + '</span>';
  }
  if (status === 'review') {
    return ' <span class="alert-badge review">' + esc(label) + '</span>';
  }
  return '';
}
function signCls(n) {
  if (n == null) return '';
  return n >= 0 ? 'pos' : 'neg';
}
function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}
function tag(type) {
  return '<span class="tag tag-' + type.toLowerCase() + '">' + type + '</span>';
}

// ── Unpack data ───────────────────────────────────────────────────────────────
var meta         = DATA.meta;
var kpi          = DATA.kpi;
var priceAlerts  = DATA.price_alerts || {};
var pdAlert      = priceAlerts.portfolio_drawdown || {};
var supAlert     = priceAlerts.sustained_underperformance || {};
var nav_series   = DATA.nav_series;
var allocation   = DATA.allocation;
var positions    = DATA.positions;
var transactions = DATA.transactions;

// ── Benchmark label (derived from strategy config, never hardcoded) ───────────
var bm = meta.benchmark || {};
var cashW = bm.cash_weight || 0;
var benchLabel = cashW > 0
  ? Math.round((1 - cashW) * 100) + '% ' + bm.symbol + ' + ' +
    Math.round(cashW * 100) + '% cash'
  : String(bm.symbol || 'Benchmark');
var benchSeriesName = 'Benchmark (' + benchLabel + ')';

var navSubtitle = document.getElementById('nav-subtitle');
navSubtitle.textContent =
  '· Benchmark: ' + benchLabel +
  ' · close + cash dividends · same inception & initial capital';
if (bm.note) navSubtitle.title = bm.note;

// ── 3.0 Header ────────────────────────────────────────────────────────────────
document.getElementById('pg-title').textContent =
  meta.strategy_name + ' Portfolio Dashboard';
var pgMetaHtml =
  'As of <strong>' + esc(meta.as_of_date) + '</strong>' +
  ' &nbsp;·&nbsp; Inception: ' + esc(meta.inception_date) +
  ' &nbsp;·&nbsp; Currency: ' + esc(meta.base_currency) +
  ' &nbsp;·&nbsp; Initial Capital: ' + fmtUSD(meta.initial_capital);
var ed = meta.expense_drag;
if (ed && ed.annual_bps) {
  pgMetaHtml +=
    ' &nbsp;·&nbsp; <span title="' + esc(ed.note || '') +
    '">Est. annual fund-expense drag: ' + fmtUSD(ed.annual_usd) +
    ' (' + ed.annual_bps.toFixed(0) + ' bps/yr, already inside fund NAVs)</span>';
}
document.getElementById('pg-meta').innerHTML = pgMetaHtml;

// ── 3.1 KPI Cards ─────────────────────────────────────────────────────────────
var cashRow    = (allocation.rows || []).find(function(r) { return r.symbol === 'CASH'; });
var cashWeight = cashRow ? fmtW(cashRow.actual_weight) : '—';

var kpiCards = [
  {
    label: 'Total Portfolio Value',
    value: fmtUSD(kpi.total_portfolio_value),
    sub: 'Positions: ' + fmtUSD(kpi.positions_market_value) +
         ' &nbsp;/&nbsp; Cash: ' + fmtUSD(kpi.cash_balance),
    cls: ''
  },
  {
    label: 'Cash Balance',
    value: fmtUSD(kpi.cash_balance),
    sub: 'Cash weight: ' + cashWeight,
    cls: ''
  },
  {
    label: 'Cumulative Return',
    value: fmtPct(kpi.cumulative_return),
    sub: 'vs Inception (' + esc(meta.inception_date) + ')',
    cls: signCls(kpi.cumulative_return)
  },
  {
    label: 'Benchmark Return',
    value: kpi.benchmark_return == null ? '—' : fmtPct(kpi.benchmark_return),
    sub: benchLabel + ', adjusted-close total return' +
         (kpi.benchmark_return == null ? ' (data unavailable)' : ''),
    cls: signCls(kpi.benchmark_return)
  },
  {
    label: 'Active Return',
    value: (kpi.active_return == null ? '—' : fmtPct(kpi.active_return))
      + (supAlert.status === 'review'
          ? alertBadge('review',
              supAlert.snapshots_window + 'w ≤ ' + supAlert.threshold_pp + 'pp')
          : ''),
    sub: kpi.active_return == null
      ? 'benchmark data unavailable'
      : 'portfolio − benchmark',
    cls: signCls(kpi.active_return),
    cardCls: supAlert.status === 'review' ? 'alert-review' : ''
  },
  {
    label: 'Drawdown from Peak',
    value: pdAlert.drawdown_pct == null ? '—' : fmtSignedPct(pdAlert.drawdown_pct),
    sub: pdAlert.peak_value == null
      ? 'no snapshots yet'
      : 'Peak ' + fmtUSD(pdAlert.peak_value) + ' on ' + esc(pdAlert.peak_date)
        + ' &nbsp;/&nbsp; review ≤ ' + pdAlert.review_threshold_pct + '%',
    cls: alertCls(pdAlert.status) || signCls(pdAlert.drawdown_pct),
    cardCls: pdAlert.status === 'review' ? 'alert-review'
           : pdAlert.status === 'hard_review' ? 'alert-hard' : ''
  },
  {
    label: 'Unrealized P&L',
    value: fmtUSD(kpi.unrealized_pnl),
    sub: 'Realized: ' + fmtUSD(kpi.realized_pnl),
    cls: signCls(kpi.unrealized_pnl)
  }
];

var grid = document.getElementById('kpi-grid');
kpiCards.forEach(function(c) {
  var div = document.createElement('div');
  div.className = 'kpi-card' + (c.cardCls ? ' ' + c.cardCls : '');
  div.innerHTML =
    '<div class="kpi-label">' + esc(c.label) + '</div>' +
    '<div class="kpi-value ' + c.cls + '">' + c.value + '</div>' +
    '<div class="kpi-sub">' + c.sub + '</div>';
  grid.appendChild(div);
});

// ── 3.2 NAV Section ───────────────────────────────────────────────────────────
var navSec = document.getElementById('nav-section');
var pts    = nav_series.points;

// Derive equity curve: cumulative return % = (nav − 1) × 100
var ecPts = pts.map(function(p) {
  return {
    date:      p.date,
    portfolio: p.portfolio_nav != null ? (p.portfolio_nav - 1) * 100 : null,
    benchmark: p.benchmark_nav != null ? (p.benchmark_nav - 1) * 100 : null
  };
});

function fmtRetPct(v) {
  if (v == null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(2) + '%';
}

var navEl = document.createElement('div');
navEl.className = 'echart';
navEl.style.height = '320px';
navSec.appendChild(navEl);

if (ecPts.length <= 3) {
  // Sparse mode: scatter + notice text instead of line chart
  var noticeEl = document.createElement('div');
  noticeEl.className = 'nav-notice';
  noticeEl.textContent = ecPts.length + ' weekly snapshot point' +
    (ecPts.length > 1 ? 's' : '') +
    ' so far — the chart switches to a line series as more snapshots accumulate.';
  navSec.insertBefore(noticeEl, navEl);

  var xData = ecPts.map(function(p) { return p.date; });

  var scatterChart = echarts.init(navEl);
  scatterChart.setOption({
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        var lines = ['<b>' + (params[0] ? params[0].axisValue : '') + '</b>'];
        var portVal = null, benchVal = null;
        params.forEach(function(p) {
          var v = Array.isArray(p.value) ? p.value[1] : p.value;
          if (p.seriesName === 'Portfolio') portVal = v;
          else benchVal = v;
          lines.push(p.marker + p.seriesName + ': ' + fmtRetPct(v));
        });
        if (portVal != null && benchVal != null) {
          var diff = portVal - benchVal;
          lines.push('<span style="color:#888">Active: ' + (diff >= 0 ? '+' : '') + diff.toFixed(2) + ' pp</span>');
        }
        return lines.join('<br/>');
      }
    },
    legend: { data: ['Portfolio', benchSeriesName], top: 0 },
    xAxis: { type: 'category', data: xData },
    yAxis: {
      type: 'value',
      scale: true,
      axisLabel: { formatter: function(v) { return fmtRetPct(v); } }
    },
    series: [
      {
        name: 'Portfolio',
        type: 'scatter',
        data: ecPts.map(function(p) { return p.portfolio; }),
        symbolSize: 10,
        label: {
          show: true, position: 'top',
          formatter: function(p) { return fmtRetPct(p.value); }
        }
      },
      {
        name: benchSeriesName,
        type: 'scatter',
        data: ecPts.map(function(p) { return p.benchmark; }),
        symbolSize: 10,
        label: {
          show: true, position: 'bottom',
          formatter: function(p) { return fmtRetPct(p.value); }
        }
      }
    ],
    grid: { left: 80, right: 20, top: 40, bottom: 30 }
  });
} else {
  // Line chart mode (≥4 points, time axis)
  var portData  = ecPts.map(function(p) { return [p.date, p.portfolio]; });
  var benchData = ecPts.map(function(p) { return [p.date, p.benchmark]; });

  var lineChart = echarts.init(navEl);
  lineChart.setOption({
    tooltip: {
      trigger: 'axis',
      formatter: function(params) {
        var date = params[0] ? (Array.isArray(params[0].value) ? params[0].value[0] : params[0].axisValue) : '';
        var lines = ['<b>' + date + '</b>'];
        var portVal = null, benchVal = null;
        params.forEach(function(p) {
          var v = Array.isArray(p.value) ? p.value[1] : p.value;
          if (p.seriesName === 'Portfolio') portVal = v;
          else benchVal = v;
          lines.push(p.marker + p.seriesName + ': ' + fmtRetPct(v));
        });
        if (portVal != null && benchVal != null) {
          var diff = portVal - benchVal;
          lines.push('<span style="color:#888">Active: ' + (diff >= 0 ? '+' : '') + diff.toFixed(2) + ' pp</span>');
        }
        return lines.join('<br/>');
      }
    },
    legend: { data: ['Portfolio', benchSeriesName], top: 0 },
    xAxis: { type: 'time' },
    yAxis: {
      type: 'value',
      scale: true,
      axisLabel: { formatter: function(v) { return fmtRetPct(v); } }
    },
    series: [
      {
        name: 'Portfolio',
        type: 'line',
        data: portData,
        smooth: false,
        connectNulls: false,
        symbol: 'none'
      },
      {
        name: benchSeriesName,
        type: 'line',
        data: benchData,
        smooth: false,
        connectNulls: false,
        symbol: 'none'
      }
    ],
    grid: { left: 80, right: 20, top: 40, bottom: 30 }
  });
}

// ── 3.3 Allocation ────────────────────────────────────────────────────────────
var allocRows = allocation.rows || [];

// Donut chart — only rows with actual_weight > 0
var donutData = allocRows
  .filter(function(r) { return r.actual_weight != null && r.actual_weight > 0; })
  .map(function(r) {
    return {
      name: r.symbol,
      value: parseFloat((r.actual_weight * 100).toFixed(4)),
      _row: r
    };
  });

var donutChart = echarts.init(document.getElementById('donut-chart'));
donutChart.setOption({
  tooltip: {
    trigger: 'item',
    formatter: function(p) {
      var r = p.data._row;
      return [
        '<b>' + esc(r.symbol) + '</b>' + (r.role ? ' (' + esc(r.role) + ')' : ''),
        'Actual: '   + fmtW(r.actual_weight),
        'Baseline: ' + (r.baseline_weight != null ? fmtW(r.baseline_weight) : '—'),
        'Drift: '    + fmtPp(r.drift_pp),
        'Rel. drift: ' + fmtRel(r.relative_drift_pct),
        'Status: '   + esc(r.drift_status)
      ].join('<br/>');
    }
  },
  series: [{
    type: 'pie',
    radius: ['38%', '68%'],
    label: { fontSize: 11, formatter: '{b}\n{d}%' },
    labelLine: { length: 8, length2: 6 },
    data: donutData,
    emphasis: {
      itemStyle: { shadowBlur: 8, shadowOffsetX: 0, shadowColor: 'rgba(0,0,0,0.2)' }
    }
  }],
  legend: { show: false }
});

// Drift bar chart — sorted by |drift_pp| descending
var sortedDrift = allocRows.slice().sort(function(a, b) {
  return Math.abs(b.drift_pp || 0) - Math.abs(a.drift_pp || 0);
});

var driftColorMap = { ok: '#546e7a', review: '#ef6c00', breach: '#c62828', 'n/a': '#bdbdbd' };
var driftBarData = sortedDrift.map(function(r) {
  return {
    value: r.drift_pp,
    itemStyle: { color: driftColorMap[r.drift_status] || '#546e7a' },
    _row: r
  };
});

// Height: at least 24px per row, minimum 200px
var driftHeight = Math.max(200, sortedDrift.length * 26 + 60);
var driftEl = document.getElementById('drift-chart');
driftEl.style.height = driftHeight + 'px';

var driftChart = echarts.init(driftEl);
driftChart.setOption({
  tooltip: {
    trigger: 'axis',
    axisPointer: { type: 'shadow' },
    formatter: function(params) {
      var r = params[0].data._row;
      return [
        '<b>' + esc(r.symbol) + '</b>' + (r.role ? ' (' + esc(r.role) + ')' : ''),
        'Drift: '    + fmtPp(r.drift_pp),
        'Actual: '   + fmtW(r.actual_weight),
        'Baseline: ' + (r.baseline_weight != null ? fmtW(r.baseline_weight) : '—'),
        'Rel. drift: ' + fmtRel(r.relative_drift_pct),
        'Review band: ±' + (r.review_band_pp != null ? r.review_band_pp + ' pp' : '—'),
        'Hard band: ±'   + (r.hard_band_pp  != null ? r.hard_band_pp  + ' pp' : '—'),
        'Status: ' + esc(r.drift_status)
      ].join('<br/>');
    }
  },
  xAxis: {
    type: 'value',
    axisLabel: { formatter: function(v) { return v + ' pp'; } }
  },
  yAxis: {
    type: 'category',
    data: sortedDrift.map(function(r) { return r.symbol; }),
    inverse: true
  },
  series: [{
    type: 'bar',
    data: driftBarData,
    label: {
      show: true,
      position: function(p) { return p.value >= 0 ? 'right' : 'left'; },
      formatter: function(p) {
        return p.data._row.drift_status === 'n/a' ? '—' : fmtPp(p.value);
      },
      fontSize: 11
    }
  }],
  grid: { left: 56, right: 90, top: 10, bottom: 30 }
});

// ── 3.4 Positions Table ───────────────────────────────────────────────────────
var posWrap = document.getElementById('positions-wrap');

if (!positions.length) {
  posWrap.innerHTML = '<p class="empty-state">No open positions.</p>';
} else {
  var sorted = positions.slice().sort(function(a, b) { return b.market_value - a.market_value; });
  var totCost = positions.reduce(function(s, p) { return s + p.cost_basis; }, 0);
  var totMv   = positions.reduce(function(s, p) { return s + p.market_value; }, 0);
  var totUnr  = positions.reduce(function(s, p) { return s + p.unrealized_pnl; }, 0);

  var rowsHtml = sorted.map(function(p) {
    var stale = p.price_date < meta.as_of_date
      ? '<span class="stale-label">⚠ stale (' + esc(p.price_date) + ')</span>' : '';
    var ddStatus = p.cost_drawdown_status || 'n/a';
    var rowCls = ddStatus === 'hard_review' ? ' class="row-alert-hard"'
               : ddStatus === 'review'      ? ' class="row-alert-review"'
               : '';
    var ddCellCls = alertCls(ddStatus) || signCls(p.cost_drawdown_pct);
    return '<tr' + rowCls + '>' +
      '<td class="left">' + esc(p.symbol) + '</td>' +
      '<td class="left">' + tag(p.asset_type) + '</td>' +
      '<td>' + fmt2(p.quantity) + '</td>' +
      '<td>' + fmtUSD(p.average_cost) + '</td>' +
      '<td>' + fmtUSD(p.latest_price) + stale + '</td>' +
      '<td>' + fmtUSD(p.cost_basis) + '</td>' +
      '<td>' + fmtUSD(p.market_value) + '</td>' +
      '<td>' + fmtW(p.actual_weight) + '</td>' +
      '<td class="' + signCls(p.unrealized_pnl) + '">' + fmtUSD(p.unrealized_pnl) + '</td>' +
      '<td class="' + ddCellCls + '">' + fmtSignedPct(p.cost_drawdown_pct) + '</td>' +
      '<td class="' + signCls(p.realized_pnl)   + '">' + fmtUSD(p.realized_pnl)   + '</td>' +
      '</tr>';
  }).join('');

  posWrap.innerHTML =
    '<table>' +
      '<thead><tr>' +
        '<th class="left">Symbol</th>' +
        '<th class="left">Type</th>' +
        '<th>Qty</th>' +
        '<th>Avg Cost</th>' +
        '<th>Price</th>' +
        '<th>Cost Basis</th>' +
        '<th>Mkt Value</th>' +
        '<th>Weight</th>' +
        '<th>Unr. PnL</th>' +
        '<th>vs Cost</th>' +
        '<th>Real. PnL</th>' +
      '</tr></thead>' +
      '<tbody>' + rowsHtml + '</tbody>' +
      '<tfoot>' +
        '<tr>' +
          '<td class="left" colspan="5">Positions Total</td>' +
          '<td>' + fmtUSD(totCost) + '</td>' +
          '<td>' + fmtUSD(totMv)   + '</td>' +
          '<td></td>' +
          '<td class="' + signCls(totUnr) + '">' + fmtUSD(totUnr) + '</td>' +
          '<td></td>' +
          '<td></td>' +
        '</tr>' +
        '<tr>' +
          '<td class="left" colspan="5">+ Cash</td>' +
          '<td></td>' +
          '<td>' + fmtUSD(kpi.cash_balance) + '</td>' +
          '<td>' + cashWeight + '</td>' +
          '<td></td><td></td><td></td>' +
        '</tr>' +
        '<tr>' +
          '<td class="left" colspan="5"><strong>Total Portfolio</strong></td>' +
          '<td></td>' +
          '<td><strong>' + fmtUSD(kpi.total_portfolio_value) + '</strong></td>' +
          '<td></td><td></td><td></td><td></td>' +
        '</tr>' +
      '</tfoot>' +
    '</table>';
}

// ── 3.5 Transactions Timeline ─────────────────────────────────────────────────
var txList = document.getElementById('tx-list');

if (!transactions.length) {
  txList.innerHTML = '<p class="empty-state">No transactions recorded.</p>';
} else {
  // Group by date
  var byDate = {};
  var dateOrder = [];
  transactions.forEach(function(tx) {
    if (!byDate[tx.trade_date]) {
      byDate[tx.trade_date] = [];
      dateOrder.push(tx.trade_date);
    }
    byDate[tx.trade_date].push(tx);
  });
  dateOrder.sort();

  dateOrder.forEach(function(date) {
    var txs      = byDate[date];
    var count    = txs.length;
    var netCash  = txs.reduce(function(s, t) { return s + t.net_amount; }, 0);
    var collapse = count >= 5;
    var listId   = 'txd-' + date.replace(/-/g, '');

    var itemsHtml = txs.map(function(t) {
      var memoId   = 'txm-' + t.transaction_id;
      var memoHtml = t.reason_memo
        ? '<span class="tx-memo-toggle" onclick="toggleEl(\'' + memoId + '\')">' +
          '[memo]</span>' +
          '<span id="' + memoId + '" class="tx-memo-text hidden">' +
          esc(t.reason_memo) + '</span>'
        : '';
      return '<div class="tx-item">' +
        '<span class="badge badge-' + t.side.toLowerCase() + '">' + esc(t.side) + '</span>' +
        '<span class="tx-sym">' + esc(t.symbol) + '</span>' +
        '<span class="tx-qty">' + fmt2(t.quantity) + ' @ ' + fmtUSD(t.price) + '</span>' +
        '<span class="tx-cat">' + (t.reason_category ? esc(t.reason_category) : '') + '</span>' +
        '<span class="tx-net ' + signCls(t.net_amount) + '">' + fmtUSD(t.net_amount) + '</span>' +
        memoHtml +
        '</div>';
    }).join('');

    var dayDiv = document.createElement('div');
    dayDiv.className = 'tx-day';
    dayDiv.innerHTML =
      '<div class="tx-day-header" onclick="toggleEl(\'' + listId + '\')">' +
        '<span>' + esc(date) + ' — ' + count +
          ' transaction' + (count > 1 ? 's' : '') + '</span>' +
        '<span class="tx-day-hint ' + signCls(netCash) + '">' +
          'Net cash: ' + fmtUSD(netCash) +
          ' · click to toggle' +
        '</span>' +
      '</div>' +
      '<div id="' + listId + '" class="tx-items' + (collapse ? ' hidden' : '') + '">' +
        itemsHtml +
      '</div>';
    txList.appendChild(dayDiv);
  });
}

// ── Toggle helper (called from inline onclick) ────────────────────────────────
window.toggleEl = function(id) {
  var el = document.getElementById(id);
  if (el) el.classList.toggle('hidden');
};

})();
</script>
</body>
</html>
